<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; background: transparent; overflow: hidden; }
    video { width: 100%; display: block; border-radius: 6px; }
  </style>
</head>
<body>
  <video id="v" controls></video>
  <script>
    // Minimal Streamlit component protocol via postMessage (no CDN needed)
    const v = document.getElementById('v');
    let lastSeg = -1;
    let ready = false;

    function send(type, payload) {
      window.parent.postMessage({ type, ...payload }, '*');
    }

    function setComponentValue(value) {
      send('streamlit:setComponentValue', { value, dataType: 'json' });
    }

    function setFrameHeight(height) {
      send('streamlit:setFrameHeight', { height });
    }

    // Tell Streamlit the component is ready
    send('streamlit:componentReady', { apiVersion: 1 });

    // Receive render events from Streamlit
    window.addEventListener('message', (event) => {
      if (event.data.type !== 'streamlit:render') return;

      const { video_url, segment_timestamps } = event.data.args;

      if (v.getAttribute('data-src') !== video_url) {
        v.src = video_url;
        v.setAttribute('data-src', video_url);
        lastSeg = -1;
      }

      v.ontimeupdate = () => {
        const t = v.currentTime;
        const seg = segment_timestamps.filter(ts => ts <= t).length - 1;
        if (seg !== lastSeg && seg >= 0) {
          lastSeg = seg;
          setComponentValue(seg);
        }
      };

      v.onloadedmetadata = () => setFrameHeight(v.offsetHeight + 4);
      setFrameHeight(v.offsetHeight || 280);
    });
  </script>
</body>
</html>
