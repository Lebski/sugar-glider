<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: transparent; }
    video { width: 100%; display: block; border-radius: 6px; }
  </style>
</head>
<body>
  <video id="v" controls preload="metadata"></video>
  <script>
    const v = document.getElementById('v');
    let lastSeg = -1;

    // All messages to Streamlit require isStreamlitMessage: true
    function send(type, payload) {
      window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, '*');
    }

    function setComponentValue(value) {
      send('streamlit:setComponentValue', { value, dataType: 'json' });
    }

    function setFrameHeight(height) {
      send('streamlit:setFrameHeight', { height });
    }

    // Signal ready first — Streamlit ignores setFrameHeight until after this
    send('streamlit:componentReady', { apiVersion: 1 });

    window.addEventListener('message', (event) => {
      if (!event.data || event.data.type !== 'streamlit:render') return;

      const args = event.data.args || {};
      const { video_url, segment_timestamps } = args;
      if (!video_url) return;

      // Set an immediate visible height now that componentReady has been ack'd
      setFrameHeight(300);

      if (v.getAttribute('data-src') !== video_url) {
        v.src = video_url;
        v.setAttribute('data-src', video_url);
        v.load();
        lastSeg = -1;
      }

      const segs = Array.isArray(segment_timestamps) ? segment_timestamps : [];

      v.ontimeupdate = () => {
        const t = v.currentTime;
        const seg = segs.filter(ts => ts <= t).length - 1;
        if (seg !== lastSeg && seg >= 0) {
          lastSeg = seg;
          setComponentValue(seg);
        }
      };

      // Refine height to exact aspect ratio once metadata arrives
      v.onloadedmetadata = () => {
        if (v.videoWidth && v.videoHeight) {
          const containerWidth = document.documentElement.clientWidth;
          const h = Math.round(containerWidth * v.videoHeight / v.videoWidth) + 8;
          setFrameHeight(h);
        }
      };
    });
  </script>
</body>
</html>
